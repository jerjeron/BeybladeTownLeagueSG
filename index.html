<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyBlade Town League 2026</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 30px 10px; text-align: center; border-bottom: 4px solid #fbbf24; }
        .main-card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; height: 100%; }
        .venue-card { background: #111827; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #374151; }
        .venue-title { color: #fbbf24; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .venue-month { color: #94a3b8; font-size: 0.75rem; margin-bottom: 10px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .rank-badge { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; font-size: 0.8rem; }
        .rank-1 { background: #fbbf24; color: #000; }
        .rank-2 { background: #94a3b8; color: #000; }
        .rank-3 { background: #92400e; color: #fff; }
        .total-score { font-weight: bold; color: #60a5fa; }
        .venue-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        /* Single style for all Top 16 Qualifiers */
        .row-qualifier {
            background-color: rgba(59, 130, 246, 0.08); /* Subtle blue background */
            border-left: 4px solid #3b82f6; /* Consistent blue bar on the left */
        }

        /* Row hover effect */
        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
        }
    </style>
</head>
<body>

<div class="hero mb-4">
    <h1 class="fw-bold">BeyBlade Town League 2026</h1>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-3 order-2 order-lg-1" id="leftVenues"></div>
        <div class="col-lg-6 order-1 order-lg-2">
            <div class="main-card mb-4">
                <h4 class="text-center mb-4">🏆 Overall Standings</h4>
                <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player name..." onkeyup="filterData()">
                <div class="table-responsive">
                    <table class="table table-dark table-sm table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Player</th>
                                <th>Bonus</th>
                                <th class="text-end">Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr><td colspan="4" class="text-center">Loading rankings...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-3 order-3 order-lg-3" id="rightVenues"></div>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';
    window.allPlayers = [];

    // Columns indices for each venue and their corresponding date column
    const venueConfigs = [
        { name: 'BeyKita!', nameCol: 8, ptsCol: 9, dateCol: 9 },
        { name: 'BeyDen', nameCol: 11, ptsCol: 12, dateCol: 12 },
        { name: 'BeyDojo', nameCol: 14, ptsCol: 15, dateCol: 15 },
        { name: 'PlayBlade', nameCol: 17, ptsCol: 18, dateCol: 18 },
        { name: 'BeastBey', nameCol: 20, ptsCol: 21, dateCol: 21 },
        { name: 'Theplayground', nameCol: 23, ptsCol: 24, dateCol: 24 }
    ];

    function renderMainTable(data) {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';
        data.forEach(p => {
            const row = document.createElement('tr');
            let rankClass = 'rank-badge';
            if(p.RANK == "1") rankClass += ' rank-1';
            else if(p.RANK == "2") rankClass += ' rank-2';
            else if(p.RANK == "3") rankClass += ' rank-3';

            row.innerHTML = `
                <td><div class="${rankClass}">${p.RANK}</div></td>
                <td><span class="fw-bold">${p['PLAYER NAME']}</span></td>
                <td><small class="text-info">+${p['TRAVEL BONUS']}</small></td>
                <td class="text-end"><span class="total-score">${p['TOTAL SCORE']}</span></td>
            `;
            body.appendChild(row);
        });
    }

    function renderVenueCards(lines) {
        const leftBox = document.getElementById('leftVenues');
        const rightBox = document.getElementById('rightVenues');
        const headerCols = lines[0].split(','); // Gets the very first row

        leftBox.innerHTML = '';
        rightBox.innerHTML = '';

        venueConfigs.forEach((v, index) => {
            const venueDate = headerCols[v.dateCol] || "April 2026"; // Fallback date
            let html = `
                <div class="venue-card">
                    <div class="venue-title">${v.name}</div>
                    <div class="venue-month">${venueDate}</div>`;
            
            let count = 0;
            for (let i = 2; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const pName = cols[v.nameCol]?.trim();
                const pPts = cols[v.ptsCol]?.trim();

                if (pName && pName !== "" && pName !== "Player Name" && count < 5) {
                    html += `
                        <div class="venue-row">
                            <span>${pName}</span>
                            <span class="text-info fw-bold">${pPts}</span>
                        </div>`;
                    count++;
                }
            }
            html += `</div>`;
            
            if (index < 3) leftBox.innerHTML += html;
            else rightBox.innerHTML += html;
        });
    }

    async function fetchLeaderboard() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const lines = csvText.split('\n');
            
            const players = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    players.push({
                        "RANK": cols[0].trim(),
                        "PLAYER NAME": cols[1].trim(),
                        "TOTAL SCORE": cols[2].trim(),
                        "TRAVEL BONUS": cols[3].trim()
                    });
                }
            }
            window.allPlayers = players;
            renderMainTable(players);
            renderVenueCards(lines);
        } catch (e) { console.error(e); }
    }

    function filterData() {
        const term = document.getElementById('playerSearch').value.toLowerCase();
        const filtered = window.allPlayers.filter(p => p['PLAYER NAME'].toLowerCase().includes(term));
        renderMainTable(filtered);
    }

    window.onload = fetchLeaderboard;

    function renderMainTable(data) {
    const body = document.getElementById('leaderboardBody');
    body.innerHTML = '';
    
    data.forEach(p => {
        const row = document.createElement('tr');
        const rankNum = parseInt(p.RANK);
        
        // Treat everyone from 1 to 16 exactly the same
        if (rankNum >= 1 && rankNum <= 16) {
            row.classList.add('row-qualifier');
        }

        // Standard rank circle colors can stay or you can make them all gray
        let rankClass = 'rank-badge';
        if(p.RANK == "1") rankClass += ' rank-1';
        else if(p.RANK == "2") rankClass += ' rank-2';
        else if(p.RANK == "3") rankClass += ' rank-3';

        row.innerHTML = `
            <td><div class="${rankClass}">${p.RANK}</div></td>
            <td>
                <span class="fw-bold ${rankNum <= 16 ? 'text-white' : 'text-secondary'}">
                    ${p['PLAYER NAME']}
                </span>
                ${rankNum <= 16 ? '<span class="badge bg-primary ms-2" style="font-size: 0.65rem;">QUALIFIED</span>' : ''}
            </td>
            <td><small class="text-info">+${p['TRAVEL BONUS']}</small></td>
            <td class="text-end"><span class="total-score">${p['TOTAL SCORE']}</span></td>
        `;
        body.appendChild(row);
    });
}
</script>
</body>
</html>
