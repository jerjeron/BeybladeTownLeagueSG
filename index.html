<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYBLADE TOWN LEAGUE 2026</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 30px 10px; text-align: center; border-bottom: 4px solid #fbbf24; }
        
        /* Main Layout Styles */
        .main-card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; }
        .venue-card { background: #111827; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #374151; }
        .venue-title { color: #fbbf24; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .venue-month { color: #94a3b8; font-size: 0.75rem; margin-bottom: 10px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        
        /* Leaderboard Table Styles */
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .rank-badge { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; font-size: 0.8rem; }
        
        /* Top 16 Highlighting */
        .row-qualifier { background-color: rgba(59, 130, 246, 0.1) !important; border-left: 4px solid #3b82f6; }
        .player-link { cursor: pointer; color: #60a5fa; text-decoration: underline dotted; }
        .player-link:hover { color: #fbbf24; }
        
        /* Venue Card Rows */
        .venue-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        
        /* Modal Checklist Styles */
        .check-item { padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .status-attended { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-missing { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

<div class="hero mb-4">
    <h1 class="fw-bold text-uppercase">Beyblade Town League 2026</h1>
    <p class="opacity-75">Live Leaderboard & Venue Tracker</p>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-3 order-2 order-lg-1" id="leftVenues"></div>

        <div class="col-lg-6 order-1 order-lg-2">
            <div class="main-card mb-4">
                <h4 class="text-center mb-4 text-white">🏆 Overall Standings</h4>
                <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player name..." onkeyup="filterData()">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th style="width: 50px;">Rank</th>
                                <th>Player Name</th>
                                <th>Bonus</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr><td colspan="4" class="text-center py-5">Syncing with Google Sheets...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-3 order-3 order-lg-3" id="rightVenues"></div>
    </div>
</div>

<div class="modal fade" id="attendanceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modalPlayerName">Player Attendance</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalBody">
          </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';
    
    window.allPlayers = [];
    window.rawCsvLines = [];

    // Mapping columns from your Public Leaderboard sheet
    const venueConfigs = [
        { name: 'BeyKita!', nameCol: 8, ptsCol: 9 },
        { name: 'BeyDen', nameCol: 11, ptsCol: 12 },
        { name: 'BeyDojo', nameCol: 14, ptsCol: 15 },
        { name: 'PlayBlade', nameCol: 17, ptsCol: 18 },
        { name: 'BeastBey', nameCol: 20, ptsCol: 21 },
        { name: 'Theplayground', nameCol: 23, ptsCol: 24 }
    ];

    async function fetchLeaderboard() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            window.rawCsvLines = csvText.split('\n');
            
            const players = [];
            for (let i = 1; i < window.rawCsvLines.length; i++) {
                const cols = window.rawCsvLines[i].split(',');
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    players.push({
                        "RANK": cols[0].trim(),
                        "PLAYER NAME": cols[1].trim(),
                        "TOTAL SCORE": cols[2].trim(),
                        "TRAVEL BONUS": cols[3].trim()
                    });
                }
            }
            window.allPlayers = players;
            renderMainTable(players);
            renderVenueCards(window.rawCsvLines);
        } catch (e) {
            console.error("Fetch error:", e);
        }
    }

    function renderMainTable(data) {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';
        
        data.forEach(p => {
            const row = document.createElement('tr');
            const rankNum = parseInt(p.RANK);
            if (rankNum <= 16) row.classList.add('row-qualifier');

            let rankClass = 'rank-badge';
            if(p.RANK == "1") rankClass += ' rank-1';
            else if(p.RANK == "2") rankClass += ' rank-2';
            else if(p.RANK == "3") rankClass += ' rank-3';

            row.innerHTML = `
                <td><div class="${rankClass}">${p.RANK}</div></td>
                <td>
                    <span class="fw-bold player-link" onclick="showAttendance('${p['PLAYER NAME']}')">
                        ${p['PLAYER NAME']}
                    </span>
                    ${rankNum <= 16 ? '<span class="badge bg-primary ms-2" style="font-size: 0.6rem;">QUALIFIED</span>' : ''}
                </td>
                <td><small class="text-info">+${p['TRAVEL BONUS']}</small></td>
                <td class="text-end font-monospace fw-bold text-info">${p['TOTAL SCORE']}</td>
            `;
            body.appendChild(row);
        });
    }

    function renderVenueCards(lines) {
        const leftBox = document.getElementById('leftVenues');
        const rightBox = document.getElementById('rightVenues');
        const header = lines[0].split(',');
        leftBox.innerHTML = '';
        rightBox.innerHTML = '';

        venueConfigs.forEach((v, index) => {
            const dateStr = header[v.ptsCol] || "2026 Season";
            let html = `<div class="venue-card"><div class="venue-title">${v.name}</div><div class="venue-month">${dateStr}</div>`;
            
            let count = 0;
            for (let i = 2; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const pName = cols[v.nameCol]?.trim();
                const pPts = cols[v.ptsCol]?.trim();
                if (pName && pName !== "" && pName !== "Player Name" && count < 5) {
                    html += `<div class="venue-row"><span>${pName}</span><span class="text-info">${pPts}</span></div>`;
                    count++;
                }
            }
            html += `</div>`;
            if (index < 3) leftBox.innerHTML += html;
            else rightBox.innerHTML += html;
        });
    }

    function showAttendance(name) {
        const modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        document.getElementById('modalPlayerName').innerText = name + "'s Attendance Tracker";
        
        // Month headers
        const months = ['April 2026', 'May 2026', 'June 2026'];
        const tracking = ['BeyKita!', 'Theplayground', 'BeyDen', 'BeyDojo'];
        
        let html = '';
        months.forEach(month => {
            html += `<p class="small text-uppercase text-secondary mt-3 mb-2 fw-bold">${month}</p>`;
            tracking.forEach(loc => {
                const attended = checkParticipation(name, loc);
                html += `
                    <div class="check-item ${attended ? 'status-attended' : 'status-missing'}">
                        <span>${loc}</span>
                        <small class="fw-bold">${attended ? '✓ ATTENDED' : '× MISSING'}</small>
                    </div>`;
            });
        });

        document.getElementById('modalBody').innerHTML = html;
        modal.show();
    }

    function checkParticipation(name, loc) {
        // Find the player's specific row
        const row = window.rawCsvLines.find(l => l.split(',')[1]?.trim() === name);
        if (!row) return false;
        const cols = row.split(',');
        
        // Maps location names to their data columns in the spreadsheet
        const map = { 'BeyKita!': 9, 'BeyDen': 12, 'BeyDojo': 15, 'Theplayground': 24 };
        const score = parseInt(cols[map[loc]]);
        return score > 0;
    }

    function filterData() {
        const term = document.getElementById('playerSearch').value.toLowerCase();
        const filtered = window.allPlayers.filter(p => p['PLAYER NAME'].toLowerCase().includes(term));
        renderMainTable(filtered);
    }

    window.onload = fetchLeaderboard;
</script>
</body>
</html>
