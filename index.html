<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYBLADE TOWN LEAGUE 2026</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 30px 10px; text-align: center; border-bottom: 4px solid #fbbf24; }
        .main-card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; }
        .venue-card { background: #111827; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #374151; min-height: 220px; }
        .venue-title { color: #fbbf24; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .venue-month { color: #94a3b8; font-size: 0.75rem; margin-bottom: 10px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .rank-badge { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; font-size: 0.8rem; }
        .row-qualifier { background-color: rgba(59, 130, 246, 0.1) !important; border-left: 4px solid #3b82f6; }
        .player-link { cursor: pointer; color: #60a5fa; text-decoration: underline dotted; }
        .player-link:hover { color: #fbbf24; }
        .venue-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        .check-item { padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .status-attended { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-missing { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .month-nav { display: flex; justify-content: space-between; align-items: center; background: #1e293b; border-radius: 10px; padding: 5px 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .nav-btn { background: none; border: none; color: #fbbf24; font-size: 1.5rem; cursor: pointer; }
        .month-display { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="hero mb-4">
    <h1 class="fw-bold">BEYBLADE TOWN LEAGUE 2026</h1>
    <p class="opacity-75">Rankings & Attendance Tracker</p>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-3 order-2 order-lg-1">
            <div class="month-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <div class="month-display" id="monthLabelLeft">April 2026</div>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div id="leftVenues"></div>
        </div>

        <div class="col-lg-6 order-1 order-lg-2">
            <div class="main-card mb-4">
                <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player name..." onkeyup="filterData()">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Player Name</th>
                                <th>Bonus</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr><td colspan="4" class="text-center py-5">Syncing data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-3 order-3 order-lg-3">
            <div class="month-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <div class="month-display" id="monthLabelRight">April 2026</div>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div id="rightVenues"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="attendanceModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modalPlayerName">Player Status</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const lbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';
    const diUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=1870481325&single=true&output=csv'; 

    window.allPlayers = [];
    window.attendanceLogs = [];
    window.rawLines = [];
    window.currentMonthIndex = 0; // 0=April, 1=May, 2=June

    async function init() {
        try {
            const [lbRes, diRes] = await Promise.all([fetch(lbUrl), fetch(diUrl)]);
            const lbTxt = await lbRes.text();
            const diTxt = await diRes.text();

            window.attendanceLogs = diTxt.split('\n').map(line => line.split(','));
            window.rawLines = lbTxt.split('\n');

            window.allPlayers = [];
            for (let i = 1; i < window.rawLines.length; i++) {
                const cols = window.rawLines[i].split(',');
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    window.allPlayers.push({
                        "RANK": cols[0].trim(),
                        "NAME": cols[1].trim(),
                        "SCORE": cols[2].trim(),
                        "BONUS": cols[3].trim()
                    });
                }
            }
            renderTable(window.allPlayers);
            renderVenues();
        } catch (e) { console.error("Error loading data:", e); }
    }

    function renderTable(data) {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';
        data.forEach(p => {
            const rankNum = parseInt(p.RANK);
            const row = document.createElement('tr');
            if(rankNum <= 16) row.classList.add('row-qualifier');

            row.innerHTML = `
                <td><div class="rank-badge">${p.RANK}</div></td>
                <td><span class="fw-bold player-link" onclick="showAttendance('${p.NAME}')">${p.NAME}</span></td>
                <td><small class="text-info">+${p.BONUS}</small></td>
                <td class="text-end fw-bold text-info">${p.SCORE}</td>
            `;
            body.appendChild(row);
        });
    }

    function changeMonth(step) {
        window.currentMonthIndex = (window.currentMonthIndex + step + 3) % 3;
        renderVenues();
    }

    function renderVenues() {
        const left = document.getElementById('leftVenues');
        const right = document.getElementById('rightVenues');
        const lines = window.rawLines;
        
        // VERTICAL ROW OFFSETS (from BeyBlade Town League 2026 (1).xlsx)
        // April starts at row index 2
        // May starts at row index 11
        // June starts at row index 19
        const monthRowStarts = [2, 11, 19];
        const startRow = monthRowStarts[window.currentMonthIndex];
        
        const monthNames = ["April 2026", "May 2026", "June 2026"];
        document.getElementById('monthLabelLeft').innerText = monthNames[window.currentMonthIndex];
        document.getElementById('monthLabelRight').innerText = monthNames[window.currentMonthIndex];

        // Column setup for venues
        const conf = [
            { n: 'BeyKita!', c: 8 }, // Col I (Index 8)
            { n: 'BeyDen', c: 11 },  // Col L (Index 11)
            { n: 'BeyDojo', c: 14 }, // Col O (Index 14)
            { n: 'PlayBlade', c: 17 }, // Col R (Index 17)
            { n: 'BeastBey', c: 20 },  // Col U (Index 20)
            { n: 'Theplayground', c: 23 } // Col X (Index 23)
        ];

        left.innerHTML = ''; right.innerHTML = '';
        conf.forEach((v, i) => {
            let html = `<div class="venue-card"><div class="venue-title">${v.n}</div><div class="venue-month">${monthNames[window.currentMonthIndex]}</div>`;
            let count = 0;
            
            // Loop 5 rows down from the startRow of the month
            for(let r = startRow; r < startRow + 6; r++) {
                if(!lines[r]) break;
                const cols = lines[r].split(',');
                const playerName = cols[v.c]?.trim();
                const playerPoints = cols[v.c+1]?.trim();

                if(playerName && playerName !== "" && playerName !== "Player Name") {
                    html += `<div class="venue-row"><span>${playerName}</span><span class="text-info">${playerPoints}</span></div>`;
                    count++;
                }
            }
            if(count === 0) html += `<div class="text-muted small py-3">No results yet.</div>`;
            html += `</div>`;
            (i < 3 ? left : right).innerHTML += html;
        });
    }

    function showAttendance(name) {
        const modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        document.getElementById('modalPlayerName').innerText = name;
        const venues = ['BeyKita!', 'Theplayground', 'BeyDen', 'BeyDojo'];
        const months = [{l:'April',k:'/04/'}, {l:'May',k:'/05/'}, {l:'June',k:'/06/'}];
        let html = '';
        months.forEach(m => {
            html += `<p class="small text-warning mt-3 mb-1 fw-bold">${m.l} 2026</p>`;
            venues.forEach(v => {
                const attended = window.attendanceLogs.some(row => {
                    return row[2]?.trim().toLowerCase() === name.toLowerCase().trim() && 
                           row[1]?.trim() === v && 
                           row[0]?.includes(m.k);
                });
                html += `<div class="check-item ${attended ? 'status-attended' : 'status-missing'}">
                    <span>${v}</span><small>${attended ? '✓' : '×'}</small></div>`;
            });
        });
        document.getElementById('modalBody').innerHTML = html;
        modal.show();
    }

    function filterData() {
        const query = document.getElementById('playerSearch').value.toLowerCase();
        renderTable(window.allPlayers.filter(p => p.NAME.toLowerCase().includes(query)));
    }

    window.onload = init;
</script>
</body>
</html>
