<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyBlade Town League 2026</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 40px 20px; text-align: center; border-bottom: 4px solid #fbbf24; }
        .leaderboard-card { background: #1e293b; border-radius: 16px; padding: 25px; margin-top: 20px; border: 1px solid #334155; }
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; padding: 15px; width: 100%; margin-bottom: 20px; }
        .rank-badge { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; }
        .rank-1 { background: #fbbf24; color: #000; }
        .rank-2 { background: #94a3b8; color: #000; }
        .rank-3 { background: #92400e; color: #fff; }
        .total-score { font-size: 1.2rem; font-weight: bold; color: #60a5fa; }
    </style>
</head>
<body>

<div class="hero">
    <h1>🏆 BeyBlade Town League 2026</h1>
</div>

<div class="container">
    <div class="leaderboard-card">
        <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player name..." onkeyup="filterData()">
        
        <div class="table-responsive">
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Bonus</th>
                        <th class="text-end">Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4" class="text-center">Loading players...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. DATA AND HELPER FUNCTIONS FIRST
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';
    window.allPlayers = [];

    // This defines renderTable so fetchLeaderboard can find it
    function renderTable(data) {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';
        
        data.forEach(p => {
            const row = document.createElement('tr');
            let rankClass = 'rank-badge';
            if(p.RANK == "1") rankClass += ' rank-1';
            else if(p.RANK == "2") rankClass += ' rank-2';
            else if(p.RANK == "3") rankClass += ' rank-3';

            row.innerHTML = `
                <td><div class="${rankClass}">${p.RANK}</div></td>
                <td><span class="fw-bold">${p['PLAYER NAME']}</span></td>
                <td><small class="text-info">+${p['TRAVEL BONUS']}</small></td>
                <td class="text-end"><span class="total-score">${p['TOTAL SCORE']}</span></td>
            `;
            body.appendChild(row);
        });
    }

    // This defines filterData so the Search Bar can find it
    function filterData() {
        const term = document.getElementById('playerSearch').value.toLowerCase();
        const filtered = window.allPlayers.filter(p => 
            p['PLAYER NAME'].toLowerCase().includes(term)
        );
        renderTable(filtered);
    }

    // 2. FETCH LOGIC LAST
    async function fetchLeaderboard() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            const lines = csvText.split('\n');
            const players = [];
            
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    players.push({
                        "RANK": cols[0].trim(),
                        "PLAYER NAME": cols[1].trim(),
                        "TOTAL SCORE": cols[2].trim(),
                        "TRAVEL BONUS": cols[3].trim()
                    });
                }
            }
            window.allPlayers = players;
            renderTable(players); // Now it is defined!
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="4">Error loading data.</td></tr>';
        }
    }

    window.onload = fetchLeaderboard;
</script>
</body>
</html>
