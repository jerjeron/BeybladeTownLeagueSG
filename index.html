<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyBlade Town League 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 50px 20px; text-align: center; border-bottom: 4px solid #fbbf24; margin-bottom: 40px; }
        .leaderboard-card { background: #1e293b; border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; padding: 15px 20px; font-size: 1.1rem; }
        .search-bar:focus { background: #0f172a; color: white; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
        .table { color: #cbd5e1; }
        .table thead th { border-bottom: 2px solid #334155; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
        .table tbody td { border-bottom: 1px solid #334155; vertical-align: middle; padding: 15px 10px; }
        .rank-badge { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; color: #fff; }
        .rank-1 { background: #fbbf24; color: #000; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .rank-2 { background: #94a3b8; color: #000; }
        .rank-3 { background: #92400e; color: #fff; }
        .total-score { font-size: 1.25rem; font-weight: 700; color: #60a5fa; }
        .bonus-pill { background: #064e3b; color: #34d399; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="hero">
    <h1 class="display-4 fw-bold">🏆 BeyBlade Town League 2026</h1>
    <p class="lead opacity-75">Official Seasonal Leaderboard & Player Rankings</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="leaderboard-card">
                <div class="mb-4">
                    <input type="text" id="playerSearch" class="form-control search-bar" placeholder="🔍 Search by player name..." onkeyup="filterData()">
                </div>
                
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">Rank</th>
                                <th>Player</th>
                                <th>Venues</th>
                                <th>Travel Bonus</th>
                                <th class="text-end">Total Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            </tbody>
                    </table>
                </div>
                <div id="noResults" class="text-center py-4 d-none">
                    <p class="text-muted">No players found matching that name.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';

    async function fetchLeaderboard() {
        try {
            const response = await fetch(sheetUrl);
            const csvText = await response.text();
            
            // Split CSV into individual lines
            const lines = csvText.split('\n');
            const players = [];
            
            // We start at i = 1 to skip your header row (RANK, PLAYER NAME...)
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                
                // Only process rows that have a valid rank and name
                // This prevents the code from breaking on empty rows at the bottom
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    players.push({
                        "RANK": cols[0].trim(),           // Column A
                        "PLAYER NAME": cols[1].trim(),    // Column B
                        "TOTAL SCORE": cols[2].trim(),    // Column C
                        "TRAVEL BONUS": cols[3].trim()    // Column D
                    });
                }
            }

            // Save to a global variable for the search filter
            window.allPlayers = players;
            
            // Run the function to display the data on your page
            renderTable(players);
            
        } catch (error) {
            console.error("Error fetching leaderboard:", error);
            document.getElementById('leaderboardBody').innerHTML = 
                '<tr><td colspan="5" class="text-center text-danger">Failed to load live data.</td></tr>';
        }
    }

    // This runs automatically when the website opens
    window.onload = fetchLeaderboard;
</script>

</body>
</html>
