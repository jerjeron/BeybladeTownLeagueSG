<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYBLADE TOWN LEAGUE 2026</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 30px 10px; text-align: center; border-bottom: 4px solid #fbbf24; }
        .main-card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; }
        .venue-card { background: #111827; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #374151; }
        .venue-title { color: #fbbf24; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .venue-month { color: #94a3b8; font-size: 0.75rem; margin-bottom: 10px; border-bottom: 1px solid #374151; padding-bottom: 5px; }
        .search-bar { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .rank-badge { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; background: #334155; font-size: 0.8rem; }
        .rank-1 { background: #fbbf24; color: #000; }
        .rank-2 { background: #94a3b8; color: #000; }
        .rank-3 { background: #92400e; color: #fff; }
        .row-qualifier { background-color: rgba(59, 130, 246, 0.1) !important; border-left: 4px solid #3b82f6; }
        .player-link { cursor: pointer; color: #60a5fa; text-decoration: underline dotted; }
        .player-link:hover { color: #fbbf24; }
        .venue-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        .check-item { padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .status-attended { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-missing { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

<div class="hero mb-4">
    <h1 class="fw-bold">BEYBLADE TOWN LEAGUE 2026</h1>
    <p class="opacity-75">Seasonal Rankings & Attendance Tracker</p>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-3 order-2 order-lg-1" id="leftVenues"></div>
        <div class="col-lg-6 order-1 order-lg-2">
            <div class="main-card mb-4">
                <input type="text" id="playerSearch" class="search-bar" placeholder="🔍 Search player name..." onkeyup="filterData()">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Player</th>
                                <th>Bonus</th>
                                <th class="text-end">Total</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr><td colspan="4" class="text-center py-5">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-3 order-3 order-lg-3" id="rightVenues"></div>
    </div>
</div>

<div class="modal fade" id="attendanceModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="modalPlayerName">Attendance Tracker</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. UPDATE THESE TWO LINKS
    const leaderboardUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=900577145&single=true&output=csv';
    const dataInputUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTN6e0bZ_iyM0z_nk42aiUL8kelO__vc2-vY_GtENxRzXDdXzLnOsWobXVBElJJZt2S4AC5BmRbTuOh/pub?gid=1870481325&single=true&output=csv';

    window.allPlayers = [];
    window.attendanceLogs = [];

    async function fetchData() {
        try {
            // Fetch both sheets at the same time
            const [lbRes, diRes] = await Promise.all([
                fetch(leaderboardUrl),
                fetch(dataInputUrl)
            ]);
            
            const lbCsv = await lbRes.text();
            const diCsv = await diRes.text();
            
            window.attendanceLogs = diCsv.split('\n').map(line => line.split(','));
            
            const lbLines = lbCsv.split('\n');
            window.allPlayers = [];
            for (let i = 1; i < lbLines.length; i++) {
                const cols = lbLines[i].split(',');
                if (cols[0] && cols[1] && !isNaN(cols[0])) {
                    window.allPlayers.push({
                        "RANK": cols[0].trim(),
                        "PLAYER NAME": cols[1].trim(),
                        "TOTAL SCORE": cols[2].trim(),
                        "TRAVEL BONUS": cols[3].trim()
                    });
                }
            }
            
            renderMainTable(window.allPlayers);
            renderVenueCards(lbLines);
        } catch (e) { console.error(e); }
    }

    function renderMainTable(data) {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = '';
        data.forEach(p => {
            const row = document.createElement('tr');
            const rank = parseInt(p.RANK);
            if (rank <= 16) row.classList.add('row-qualifier');
            
            row.innerHTML = `
                <td><div class="rank-badge ${rank <= 3 ? 'rank-'+rank : ''}">${p.RANK}</div></td>
                <td>
                    <span class="fw-bold player-link" onclick="showAttendance('${p['PLAYER NAME']}')">${p['PLAYER NAME']}</span>
                    ${rank <= 16 ? '<span class="badge bg-primary ms-2" style="font-size:0.6rem">QUALIFIED</span>' : ''}
                </td>
                <td><small class="text-info">+${p['TRAVEL BONUS']}</small></td>
                <td class="text-end fw-bold text-info">${p['TOTAL SCORE']}</td>
            `;
            body.appendChild(row);
        });
    }

    function renderVenueCards(lines) {
        const left = document.getElementById('leftVenues');
        const right = document.getElementById('rightVenues');
        const header = lines[0].split(',');
        const configs = [
            { name: 'BeyKita!', col: 9 }, { name: 'BeyDen', col: 12 }, { name: 'BeyDojo', col: 15 },
            { name: 'PlayBlade', col: 18 }, { name: 'BeastBey', col: 21 }, { name: 'Theplayground', col: 24 }
        ];
        
        left.innerHTML = ''; right.innerHTML = '';
        configs.forEach((v, idx) => {
            let html = `<div class="venue-card"><div class="venue-title">${v.name}</div><div class="venue-month">${header[v.col] || 'April 2026'}</div>`;
            // Pulling top 5 from summary for quick view
            let count = 0;
            for(let i=2; i<lines.length && count<5; i++) {
                const c = lines[i].split(',');
                if(c[v.col-1]?.trim()) {
                    html += `<div class="venue-row"><span>${c[v.col-1]}</span><span class="text-info">${c[v.col]}</span></div>`;
                    count++;
                }
            }
            html += `</div>`;
            (idx < 3 ? left : right).innerHTML += html;
        });
    }

    function showAttendance(playerName) {
        const modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        document.getElementById('modalPlayerName').innerText = playerName;
        
        const venues = ['BeyKita!', 'Theplayground', 'BeyDen', 'BeyDojo'];
        const schedule = [
            { label: 'April 2026', code: '-04-' },
            { label: 'May 2026', code: '-05-' },
            { label: 'June 2026', code: '-06-' }
        ];
        
        let html = '';
        schedule.forEach(month => {
            html += `<p class="small text-warning mt-3 mb-1 fw-bold">${month.label}</p>`;
            venues.forEach(v => {
                const attended = window.attendanceLogs.some(row => 
                    row[2]?.trim().toLowerCase() === playerName.toLowerCase() && 
                    row[1]?.trim() === v && 
                    row[0]?.includes(month.code)
                );
                html += `
                    <div class="check-item ${attended ? 'status-attended' : 'status-missing'}">
                        <span>${v}</span>
                        <small>${attended ? '✅ ATTENDED' : '❌ MISSING'}</small>
                    </div>`;
            });
        });
        document.getElementById('modalBody').innerHTML = html;
        modal.show();
    }

    function filterData() {
        const term = document.getElementById('playerSearch').value.toLowerCase();
        renderMainTable(window.allPlayers.filter(p => p['PLAYER NAME'].toLowerCase().includes(term)));
    }

    window.onload = fetchData;
</script>
</body>
</html>
